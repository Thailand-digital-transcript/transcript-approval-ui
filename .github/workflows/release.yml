name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build once, locally, and assert the image is well-formed BEFORE publishing.
      # Without this, a broken healthcheck or jar path ships green and is only
      # caught at Task 8's full-saga run.
      # Same build-args as the published build below — otherwise verification
      # passes against a differently-configured image than the one shipped.
      - name: Build image for verification
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: verify:local
          build-args: |
            VITE_API_BASE_URL=http://localhost:8095
            VITE_KEYCLOAK_URL=http://localhost:8080
            VITE_KEYCLOAK_REALM=transcript
            VITE_KEYCLOAK_CLIENT_ID=transcript-approval-ui
            VITE_AUTH_DISABLED=false

      - name: Verify image
        run: ./.github/verify-image.sh verify:local

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/thailand-digital-transcript/transcript-approval-ui
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=semver,pattern=v{{version}}

      # Vite inlines these at build time. They must match the demo's published
      # host ports (orchestrator 8095, keycloak 8080) or the image is unusable.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=http://localhost:8095
            VITE_KEYCLOAK_URL=http://localhost:8080
            VITE_KEYCLOAK_REALM=transcript
            VITE_KEYCLOAK_CLIENT_ID=transcript-approval-ui
            VITE_AUTH_DISABLED=false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
